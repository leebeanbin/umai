name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npx tsc --noEmit
      - run: cd frontend && npx eslint src --ext .ts,.tsx --max-warnings 0
      - run: cd frontend && npm run build

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: umai_test
          POSTGRES_USER: umai
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U umai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: cd backend && uv sync --frozen --dev
      - name: Verify requirements.txt is in sync with uv.lock
        run: |
          cd backend && uv export --no-dev --no-hashes -o requirements.check.txt
          diff requirements.txt requirements.check.txt || (echo "requirements.txt is out of sync. Run: uv export --no-dev --no-hashes -o requirements.txt" && exit 1)
          rm requirements.check.txt
      - run: cd backend && uv run ruff check app/
      - run: cd backend && uv run pytest tests/ -x --timeout=60 -q
        env:
          DATABASE_URL: postgresql+asyncpg://umai:test@localhost:5432/umai_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-32-chars-minimum-x!
          DEBUG: "true"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: "--only-verified"
