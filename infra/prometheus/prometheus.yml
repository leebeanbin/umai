global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: umai-backend
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  - job_name: umai-celery
    static_configs:
      - targets: ["flower:5555"]
    metrics_path: /metrics
