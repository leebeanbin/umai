# ──────────────────────────────────────────────────────────────────────────────
# Umai 로컬 개발 Compose  (이 Mac 전용 포트 설정)
#
# 현재 사용 중인 포트:
#   3000 open-webui | 3001 기타 | 5432 postgres | 6379 redis
#
# Umai 전용 포트:
#   5434 postgres | 6380 redis | 8001 backend | 3002 frontend(native)
#
# 사용법: make dev   (Makefile 참고)
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  umai-postgres:
    image: postgres:16-alpine
    container_name: umai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     umai
      POSTGRES_PASSWORD: umai
      POSTGRES_DB:       umai
    command: >
      postgres
        -c shared_buffers=128MB
        -c effective_cache_size=256MB
        -c work_mem=8MB
        -c max_connections=100
        -c log_min_duration_statement=2000
    volumes:
      - umai_postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"          # ← 5434 (시스템 5432 회피)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umai -d umai"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  umai-redis:
    image: redis:7-alpine
    container_name: umai-redis
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
    volumes:
      - umai_redis_data:/data
    ports:
      - "6380:6379"          # ← 6380 (시스템 6379 회피)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── FastAPI Backend (volume 마운트 → --reload 지원) ──────────────────────────
  umai-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: umai-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://umai:umai@umai-postgres:5432/umai
      REDIS_URL: redis://umai-redis:6379/0
      CELERY_BROKER_URL: redis://umai-redis:6379/1
      CELERY_RESULT_BACKEND: redis://umai-redis:6379/2
      BACKEND_URL: http://localhost:8001
      # FRONTEND_URL은 .env 에서 읽음 — 포트는 자동 감지되므로 별도 지정 불필요
      DEBUG: "true"
      # host.docker.internal → macOS/Windows Docker Desktop에서 호스트 머신 접근
      OLLAMA_URL: http://host.docker.internal:11434
    # 소스 마운트 → uvicorn --reload 로 코드 변경 즉시 반영
    volumes:
      - ./backend:/app
    command: >
      uvicorn main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app
    ports:
      - "8001:8000"          # ← 호스트 8001 → 컨테이너 8000
    depends_on:
      umai-postgres:
        condition: service_healthy
      umai-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Celery Worker ────────────────────────────────────────────────────────────
  umai-celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: umai-celery
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://umai:umai@umai-postgres:5432/umai
      REDIS_URL: redis://umai-redis:6379/0
      CELERY_BROKER_URL: redis://umai-redis:6379/1
      CELERY_RESULT_BACKEND: redis://umai-redis:6379/2
      OLLAMA_URL: http://host.docker.internal:11434
      DEBUG: "true"
    volumes:
      - ./backend:/app
    command: >
      celery -A app.core.celery_app worker
        -Q image,ai,knowledge,default
        -c 4
        --loglevel=info
    depends_on:
      umai-postgres:
        condition: service_healthy
      umai-redis:
        condition: service_healthy

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  umai-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Next.js rewrite proxy → internal Docker 네트워크 주소
        INTERNAL_API_URL: http://umai-backend:8000
    container_name: umai-frontend
    restart: unless-stopped
    ports:
      - "3002:3000"          # ← 호스트 3002 → 컨테이너 3000
    depends_on:
      umai-backend:
        condition: service_healthy

volumes:
  umai_postgres_data:
  umai_redis_data:
