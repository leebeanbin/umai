# ──────────────────────────────────────────────────────────────────────────────
# Umai 로컬 개발 Compose  (이 Mac 전용 포트 설정)
#
# 현재 사용 중인 포트:
#   3000 open-webui | 3001 기타 | 5432 postgres | 6379 redis | 9092-9093 kafka
#
# Umai 전용 포트:
#   5434 postgres | 6380 redis | 9095 kafka | 8001 backend | 3002 frontend(native)
#
# 사용법: make dev   (Makefile 참고)
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  umai-postgres:
    image: postgres:16-alpine
    container_name: umai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     umai
      POSTGRES_PASSWORD: umai
      POSTGRES_DB:       umai
    command: >
      postgres
        -c shared_buffers=128MB
        -c effective_cache_size=256MB
        -c work_mem=8MB
        -c max_connections=100
        -c log_min_duration_statement=2000
    volumes:
      - umai_postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"          # ← 5434 (시스템 5432 회피)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umai -d umai"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  umai-redis:
    image: redis:7-alpine
    container_name: umai-redis
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
    volumes:
      - umai_redis_data:/data
    ports:
      - "6380:6379"          # ← 6380 (시스템 6379 회피)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Kafka 3.9 (Apache KRaft) ─────────────────────────────────────────────────
  umai-kafka:
    image: apache/kafka:3.9.0
    container_name: umai-kafka
    restart: unless-stopped
    environment:
      # KRaft 단일 노드 설정
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@umai-kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://umai-kafka:9092,EXTERNAL://localhost:9095
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 2
      KAFKA_LOG_RETENTION_HOURS: 12
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - umai_kafka_data:/var/lib/kafka/data
    ports:
      - "9095:9094"          # ← 9095 외부 접근 (9092-9093 회피)
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── FastAPI Backend (volume 마운트 → --reload 지원) ──────────────────────────
  umai-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: umai-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://umai:umai@umai-postgres:5432/umai
      REDIS_URL: redis://umai-redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: umai-kafka:9092
      BACKEND_URL: http://localhost:8001
      FRONTEND_URL: http://localhost:3001
      DEBUG: "true"
    # 소스 마운트 → uvicorn --reload 로 코드 변경 즉시 반영
    volumes:
      - ./backend:/app
    command: >
      uvicorn main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app
    ports:
      - "8001:8000"          # ← 호스트 8001 → 컨테이너 8000
    depends_on:
      umai-postgres:
        condition: service_healthy
      umai-redis:
        condition: service_healthy
      umai-kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  umai-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 브라우저에서 접근하는 주소 → 호스트 포트 8001
        NEXT_PUBLIC_API_URL: http://localhost:8001
    container_name: umai-frontend
    restart: unless-stopped
    ports:
      - "3002:3000"          # ← 호스트 3002 → 컨테이너 3000
    depends_on:
      umai-backend:
        condition: service_healthy

volumes:
  umai_postgres_data:
  umai_redis_data:
  umai_kafka_data:
