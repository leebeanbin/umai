user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── 로깅 ────────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;               # nginx 버전 숨기기

    # ── 요청 크기 제한 ────────────────────────────────────────────────────────
    client_max_body_size 10m;        # 파일 업로드 최대 10MB
    client_body_timeout 10s;
    client_header_timeout 10s;

    # ── Rate Limit 존 정의 ────────────────────────────────────────────────────
    # 인증 엔드포인트: IP당 5req/min (브루트포스 방지)
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/m;
    # 일반 API: IP당 60req/min
    limit_req_zone $binary_remote_addr zone=api:10m     rate=60r/m;
    # 프론트엔드: IP당 120req/min
    limit_req_zone $binary_remote_addr zone=frontend:10m rate=120r/m;

    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    # ── Gzip 압축 ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # ── 업스트림 ──────────────────────────────────────────────────────────────
    upstream backend {
        server umai-backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server umai-frontend:3000;
        keepalive 32;
    }

    # ── HTTP → HTTPS 리다이렉트 (SSL 설정 후 활성화) ─────────────────────────
    # server {
    #     listen 80;
    #     server_name yourdomain.com;
    #     return 301 https://$host$request_uri;
    # }

    # ── 메인 서버 ─────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;                 # 도메인 설정 전 임시

        # ── 보안 헤더 ────────────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # IP당 동시 연결 제한
        limit_conn perip 20;

        # ── 인증 API (엄격한 rate limit) ─────────────────────────────────────
        location ~ ^/api/v1/auth/(login|register|refresh) {
            limit_req zone=auth burst=3 nodelay;

            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 10s;
        }

        # ── OAuth 콜백 (rate limit 없음, 리다이렉트) ─────────────────────────
        location ~ ^/api/v1/auth/oauth/ {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── 일반 API ─────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;

            # CORS는 FastAPI에서 처리
        }

        # ── 헬스체크 (외부 모니터링용) ───────────────────────────────────────
        location /health {
            proxy_pass http://backend;
            access_log off;
        }

        # ── 프론트엔드 ───────────────────────────────────────────────────────
        location / {
            limit_req zone=frontend burst=30 nodelay;

            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Next.js SSE / streaming 지원
            proxy_buffering    off;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Next.js 정적 파일 캐싱 ───────────────────────────────────────────
        location /_next/static/ {
            proxy_pass http://frontend;
            proxy_cache_valid 200 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # ── 429 커스텀 응답 ──────────────────────────────────────────────────
        error_page 429 = @too_many;
        location @too_many {
            default_type application/json;
            return 429 '{"detail":"Too many requests. Please slow down."}';
        }
    }
}
