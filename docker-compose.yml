# ──────────────────────────────────────────────────────────────────────────────
# Umai 프로덕션 Compose
#
# 사용법:
#   cp backend/.env.example backend/.env
#   docker compose up --build -d
#
# 메모리 배분:
#   nginx 128MB | postgres 2GB | redis 512MB
#   backend 1GB | worker 1GB  | frontend 512MB   합계 ~5GB
#
# Worker 스케일 아웃:
#   docker compose up --scale worker=3 -d
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Nginx (리버스 프록시 + Rate Limit) ───────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: umai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro      # SSL 인증서 (Let's Encrypt)
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: umai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-umai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB:       ${POSTGRES_DB:-umai}
    command: >
      postgres
        -c shared_buffers=512MB
        -c effective_cache_size=1536MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c max_connections=100
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 외부 포트 미노출 (컨테이너 내부 통신만)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-umai}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: umai-redis
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 400mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD required}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── Alembic Migration (일회성) ────────────────────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-umai}:${POSTGRES_PASSWORD:-umai}@postgres:5432/${POSTGRES_DB:-umai}
    command: alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: umai-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-umai}:${POSTGRES_PASSWORD:-umai}@postgres:5432/${POSTGRES_DB:-umai}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/2
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      BACKEND_URL: ${BACKEND_URL:?BACKEND_URL required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL required}
    command: >
      uvicorn main:app
        --host 0.0.0.0
        --port 8000
        --workers 2
        --loop uvloop
        --http httptools
    # 외부 포트 미노출 (nginx 경유)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  # ── Celery Worker ────────────────────────────────────────────────────────────
  # 저사양 서버: -c 2 (2코어 병렬)
  # 스케일 아웃: docker compose up --scale worker=3 -d
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-umai}:${POSTGRES_PASSWORD:-umai}@postgres:5432/${POSTGRES_DB:-umai}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/2
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
    command: >
      celery -A app.core.celery_app worker
        -Q image,ai,knowledge,default
        -c ${CELERY_CONCURRENCY:-2}
        --loglevel=info
        --without-heartbeat
        --without-gossip
        --without-mingle
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.5"

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Next.js rewrite proxy 대상 — internal Docker 네트워크 주소
        INTERNAL_API_URL: http://backend:8000
    container_name: umai-frontend
    restart: unless-stopped
    # 외부 포트 미노출 (nginx 경유)
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

volumes:
  postgres_data:
  redis_data:
