# ──────────────────────────────────────────────────────────────────────────────
# Umai 프로덕션 Compose (Oracle Cloud Free Tier 기준)
# Oracle ARM VM: 4 OCPU / 24GB RAM → 전체 스택 충분히 수용
#
# 사용법:
#   cp backend/.env.example backend/.env   # 실제 키 입력
#   docker compose up --build -d
#
# 메모리 배분 (24GB 기준):
#   nginx    128MB | postgres 2GB | redis 512MB | kafka 1GB
#   backend  1GB   | frontend 512MB             합계 ~5GB (여유 충분)
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Nginx (리버스 프록시 + Rate Limit) ───────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: umai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro      # SSL 인증서 (Let's Encrypt)
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: umai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-umai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB:       ${POSTGRES_DB:-umai}
    command: >
      postgres
        -c shared_buffers=512MB
        -c effective_cache_size=1536MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c max_connections=100
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 외부 포트 미노출 (컨테이너 내부 통신만)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-umai}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: umai-redis
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 400mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
        --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── Kafka 3.9 (Apache KRaft) ─────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    container_name: umai-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 67108864
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      # JVM 힙 제한 (Oracle Free Tier 메모리 보호)
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  # ── Alembic Migration (일회성) ────────────────────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-umai}:${POSTGRES_PASSWORD:-umai}@postgres:5432/${POSTGRES_DB:-umai}
    command: alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: umai-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-umai}:${POSTGRES_PASSWORD:-umai}@postgres:5432/${POSTGRES_DB:-umai}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BACKEND_URL: ${BACKEND_URL:?BACKEND_URL required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL required}
    command: >
      uvicorn main:app
        --host 0.0.0.0
        --port 8000
        --workers 2
        --loop uvloop
        --http httptools
    # 외부 포트 미노출 (nginx 경유)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 브라우저가 접근할 백엔드 주소 (도메인 or IP)
        NEXT_PUBLIC_API_URL: ${BACKEND_URL:?BACKEND_URL required}
    container_name: umai-frontend
    restart: unless-stopped
    # 외부 포트 미노출 (nginx 경유)
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

volumes:
  postgres_data:
  redis_data:
  kafka_data:
