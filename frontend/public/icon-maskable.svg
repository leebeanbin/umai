      <stop offset="0%" stop-color="#9b8dfa"/>
      <stop offset="100%" stop-color="#6250e4"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background for Android adaptive icon (no rounded corners) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!--
    U letterform scaled to inner safe zone (80% = 410px circle).
